services:
  - type: web
    name: cargo-stats-dashboard
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    healthCheckPolicy:
      response:
        statuses:
          - 200
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
