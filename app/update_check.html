<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargo Stats</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Consolas', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            text-align: center;
        }
        .logo {
            font-size: 48px;
            filter: drop-shadow(0 0 20px rgba(88,166,255,0.3));
        }
        .app-name {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #e0e0e0;
        }
        .app-version {
            font-size: 13px;
            color: #666;
            margin-top: -16px;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #1a1a22;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-text {
            font-size: 14px;
            color: #888;
        }
        .update-card {
            display: none;
            background: #0d1117;
            border: 1px solid #1e1e28;
            border-radius: 12px;
            padding: 32px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .update-card.show { display: block; }
        .update-card .icon { font-size: 36px; margin-bottom: 12px; }
        .update-card h2 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
        .update-card p { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.5; }
        .update-card .btn-group { display: flex; gap: 10px; justify-content: center; }
        .update-card .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .update-card .btn:hover { opacity: 0.85; }
        .update-card .btn-primary {
            background: #238636;
            color: #fff;
        }
        .update-card .btn-primary:disabled {
            background: #1a5a2a;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .update-card .btn-secondary {
            background: transparent;
            color: #888;
            border: 1px solid #333;
        }
        .update-card .btn-secondary:hover { color: #e0e0e0; border-color: #555; }
        .progress-section {
            display: none;
            margin-top: 16px;
            text-align: left;
        }
        .progress-section.show { display: block; }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1a1a22;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #58a6ff;
            border-radius: 3px;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 11px;
            color: #666;
            margin-top: 6px;
            text-align: center;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">&#x1F6CE;</div>
        <div class="app-name">CARGO STATS</div>
        <div class="app-version" id="app-version">v0.0.0</div>
        <div class="spinner" id="spinner"></div>
        <div class="status-text" id="status-text">Verificando atualiza&ccedil;&otilde;es...</div>

        <div class="update-card" id="update-card">
            <div class="icon">&#x1F4E6;</div>
            <h2>Nova vers&atilde;o dispon&iacute;vel</h2>
            <p id="update-description">Uma nova vers&atilde;o do Cargo Stats est&aacute; dispon&iacute;vel para instala&ccedil;&atilde;o.</p>
            <div class="btn-group" id="btn-group">
                <button class="btn btn-primary" id="btn-install">Instalar Agora</button>
                <button class="btn btn-secondary" id="btn-later">Agora N&atilde;o</button>
            </div>
            <div class="progress-section" id="progress-section">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="progress-text" id="progress-text">0%</div>
            </div>
            <div class="btn-group" id="btn-restart-group" style="display:none;">
                <button class="btn btn-primary" id="btn-restart">Reiniciar Agora</button>
                <button class="btn btn-secondary" id="btn-restart-later">Depois</button>
            </div>
        </div>
    </div>

    <script src="js/update_check.js"></script>
</body>
</html>
